name: Release

on:
  push:
    tags:
      - 'v*.*.*' # Déclenché sur les tags semver : v1.0.0, v2.3.1, etc.

jobs:
  release:
    name: Publish & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write # Pour créer la GitHub Release
      id-token: write # Pour npm provenance (sécurité supply chain)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build
        run: npm run build

      - name: Test (gate de sécurité avant publication)
        run: npm run test

      # Publier le package npm avec provenance via Trusted Publishers (OIDC, sans token)
      # Le tag npm est déduit depuis la version : alpha → tag "alpha", beta → "beta", sinon "latest"
      # Si aucune version stable (sans pré-release) n'existe sur npm, "latest" est aussi promu
      # pour que `npm install @ariane-ui/core` fonctionne sans spécifier de tag.
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          if [[ "$VERSION" == *"-alpha"* ]]; then TAG="alpha"
          elif [[ "$VERSION" == *"-beta"* ]]; then TAG="beta"
          else TAG="latest"
          fi
          npm publish --workspace packages/core --access public --tag $TAG
          # Promouvoir latest si aucune version stable n'existe encore
          STABLE=$(npm view @ariane-ui/core versions --json | node -e \
            "const v=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); \
             console.log(v.filter(x=>!x.includes('-')).length > 0 ? 'yes' : 'no')")
          if [[ "$STABLE" == "no" && "$TAG" != "latest" ]]; then
            npm dist-tag add @ariane-ui/core@$VERSION latest
            echo "Promoted $VERSION to latest (no stable version exists)"
          fi

      # Créer la GitHub Release avec le contenu du tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      # Déployer la doc (adapter selon ton hébergeur)
      # Exemple avec Vercel CLI :
      # - name: Deploy docs to Vercel
      #   run: npx vercel deploy apps/docs --prod --token=${{ secrets.VERCEL_TOKEN }}
