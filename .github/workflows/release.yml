name: Release

on:
  push:
    tags:
      - 'v*.*.*' # Déclenché sur les tags semver : v1.0.0, v2.3.1, etc.

jobs:
  release:
    name: Publish & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write # Pour créer la GitHub Release
      id-token: write # Pour npm provenance (sécurité supply chain)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          # Pas de registry-url ici — l'auth se fait via OIDC Trusted Publishers (--provenance)

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build
        run: npm run build

      - name: Test (gate de sécurité avant publication)
        run: npm run test

      # Publier le package npm avec provenance via Trusted Publishers (OIDC, sans token)
      # Logique du tag npm :
      #   - version stable (sans pré-release suffix) → "latest"
      #   - "-alpha.*" → "alpha", sauf si aucune version stable n'existe → aussi "latest"
      #   - "-beta.*"  → "beta",  sauf si aucune version stable n'existe → aussi "latest"
      # Cela permet à `npm install @ariane-ui/core` de fonctionner pendant la phase alpha/beta.
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          # Vérifie si une version stable existe déjà sur npm
          STABLE=$(npm view @ariane-ui/core versions --json 2>/dev/null | \
            node -e "const v=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')); \
                     console.log(v.filter(x=>!x.includes('-')).length > 0 ? 'yes' : 'no')" \
            || echo "no")
          if [[ "$VERSION" == *"-alpha"* ]]; then TAG="alpha"
          elif [[ "$VERSION" == *"-beta"* ]]; then TAG="beta"
          else TAG="latest"
          fi
          # Pas de version stable → publier aussi sous latest pour que
          # `npm install @ariane-ui/core` fonctionne sans tag explicite.
          # On publie deux fois car dist-tag add n'est pas compatible OIDC.
          if [[ "$STABLE" == "no" && "$TAG" != "latest" ]]; then
            npm publish --workspace packages/core --access public --provenance --tag latest
            npm publish --workspace packages/core --access public --provenance --tag $TAG
            echo "Published $VERSION with tags: latest + $TAG (no stable version exists)"
          else
            npm publish --workspace packages/core --access public --provenance --tag $TAG
            echo "Published $VERSION with tag: $TAG"
          fi

      # Créer la GitHub Release avec le contenu du tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      # Déployer la doc (adapter selon ton hébergeur)
      # Exemple avec Vercel CLI :
      # - name: Deploy docs to Vercel
      #   run: npx vercel deploy apps/docs --prod --token=${{ secrets.VERCEL_TOKEN }}
