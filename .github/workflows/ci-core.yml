name: CI (core)

on:
  push:
    branches: [main, dev, next]
  pull_request:
    branches: [main, dev, next]
    paths:
      - 'packages/core/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci-core.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test & Build (core)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      # Restaure le cache Turborepo entre les runs
      # Évite de tout rebuilder si les inputs n'ont pas changé
      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Lint
        run: npm run lint --workspace=packages/core

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage --workspace=packages/core

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: packages/core/coverage/
          retention-days: 7

  browser:
    name: Browser Tests (core)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser tests
        run: npm run test:browser --workspace=packages/core
