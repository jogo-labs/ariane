name: CI

on:
  push:
    branches: [main, dev, next]
  pull_request:
    branches: [main, dev, next]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true # Annule le run précédent si un nouveau push arrive sur la même branche

jobs:
  # Détecte les fichiers modifiés pour conditionner les jobs suivants (PR uniquement)
  filter:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - '.github/workflows/ci.yml'
            docs:
              - 'apps/docs/**'
              - 'packages/core/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'

  ci:
    name: Lint, Test & Build (core)
    runs-on: ubuntu-latest
    needs: filter
    # Toujours sur push direct ; sur PR uniquement si packages/core a changé
    if: github.event_name == 'push' || needs.filter.outputs.core == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      # Restaure le cache Turborepo entre les runs
      # Évite de tout rebuilder si les inputs n'ont pas changé
      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Lint
        run: npm run lint --workspace=packages/core

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage --workspace=packages/core

      - name: Upload coverage
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-report
          path: packages/core/coverage/
          retention-days: 7

  browser:
    name: Browser Tests (core)
    runs-on: ubuntu-latest
    needs: filter
    if: github.event_name == 'push' || needs.filter.outputs.core == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser tests
        run: npm run test:browser --workspace=packages/core

  docs:
    name: Lint, Test & Build (docs)
    runs-on: ubuntu-latest
    needs: filter
    if: github.event_name == 'push' || needs.filter.outputs.docs == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Lint docs
        run: npm run lint --workspace=apps/docs

      - name: Build core (required by docs)
        run: npm run build --workspace=packages/core

      - name: Test docs (unit)
        run: npm run test --workspace=apps/docs

      - name: Build docs
        run: npm run build --workspace=apps/docs

      - name: Check build output
        run: npm run test:build --workspace=apps/docs
